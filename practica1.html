<!DOCTYPE html>
<!-- 
<!DOCTYPE html>: No es una etiqueta técnica, sino una declaración. Le dice al navegador: "Oye, este documento está escrito en HTML5". Sin esto, el navegador podría entrar en "modo de compatibilidad" y mostrar tu página de forma extraña. -->

<html lang="en">
    <!-- 
<html lang="en">: Es el contenedor principal de todo el código. El atributo lang="en" especifica que el idioma principal del contenido es el inglés. Cambiarlo a lang="es" es buena práctica si tu sitio es en español, ya que ayuda a los motores de búsqueda y a los lectores de pantalla. -->
<head>
    <!-- 
    El <head> (La "Mente" de la página)
Esta sección contiene información que no se ve directamente en la página, pero que es crucial para que funcione y se posicione bien. -->
    <meta charset="UTF-8">
    <!-- 
    <meta charset="UTF-8">: Define la codificación de caracteres. UTF-8 permite que tu web muestre correctamente tildes, la letra "ñ" y emojis. Sin esto, podrías ver símbolos extraños. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">: Es esencial para el diseño responsivo. Hace que el ancho de la página se adapte al tamaño de la pantalla del dispositivo (móvil, tablet o PC) y establece el zoom inicial. -->
    <title>Document</title>
    <!-- 
    <title>Document</title>: Es el nombre que aparece en la pestaña del navegador. También es lo primero que lee Google al mostrar resultados de búsqueda. -->
</head>
<body>
    <!-- 
    El <body> (El "Cuerpo")
<body>: Aquí va todo lo que el usuario ve: textos, imágenes, botones, videos y enlaces. En tu ejemplo está vacío, por lo que la página se vería totalmente en blanco. -->
    
</body>
</html>
